name: Publish to npm

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (do not actually publish)"
        required: false
        default: false
        type: boolean
  push:
    tags:
      - "v*"

permissions:
  contents: read
  id-token: write # required for npm OIDC trusted publishing

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8

      - name: Setup node env
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # 6.4.0
        with:
          node-version-file: ".node-version"
          package-manager-cache: false
          registry-url: "https://registry.npmjs.org"

      # npm >= 11.5.1 is required for OIDC trusted publishing.
      # Pinned to 11.10.0 to avoid a self-upgrade crash on the GitHub-hosted runner
      # image (npm 10.9.7 + npm >= 11.12.0 hits MODULE_NOT_FOUND: promise-retry).
      # See https://github.com/actions/runner-images/issues/13883
      - name: Ensure npm supports OIDC trusted publishing
        run: npm install -g npm@11.10.0

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build SDK
        run: pnpm build

      - name: Publish to npm via OIDC
        run: |
          npm publish \
            --provenance \
            --access public \
            ${{ inputs.dry_run && '--dry-run' || '' }}
